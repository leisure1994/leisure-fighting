<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="核战争城市自救地图 - 查询中国各城市地下避难所、人防工程位置">
    <meta name="keywords" content="核战争,避难所,人防工程,自救地图,生存指南">
    <title>核战争城市自救地图 | Nuclear Survival Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 加载动画 -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="nuclear-symbol">
                <div class="circle outer"></div>
                <div class="circle inner"></div>
                <div class="fan fan-1"></div>
                <div class="fan fan-2"></div>
                <div class="fan fan-3"></div>
            </div>
            <h1 class="loading-title">核战争城市自救地图</h1>
            <p class="loading-subtitle">初始化地图数据...</p>
            <div class="loading-progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- 主容器 -->
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-left">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo">
                    <i class="fas fa-radiation"></i>
                    <span class="logo-text">核战自救地图</span>
                </div>
            </div>
            
            <div class="header-center">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="city-search" placeholder="搜索城市、避难所名称..." autocomplete="off">
                    <button class="search-clear" id="search-clear">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="search-suggestions" id="search-suggestions"></div>
                </div>
            </div>
            
            <div class="header-right">
                <button class="btn-emergency" id="emergency-btn">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span class="btn-text">紧急模式</span>
                </button>
                <button class="btn-guide" id="guide-btn">
                    <i class="fas fa-book-medical"></i>
                    <span class="btn-text">生存指南</span>
                </button>
            </div>
        </header>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-filter"></i> 筛选设置</h2>
                <button class="sidebar-close" id="sidebar-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="sidebar-content">
                <!-- 城市选择 -->
                <div class="filter-section">
                    <h3><i class="fas fa-city"></i> 选择城市</h3>
                    <div class="city-selector">
                        <select id="province-select">
                            <option value="">全部省份</option>
                        </select>
                        <select id="city-select">
                            <option value="">选择城市</option>
                        </select>
                    </div>
                    <div class="quick-cities">
                        <span class="quick-label">热门城市：</span>
                        <button class="quick-city" data-city="北京">北京</button>
                        <button class="quick-city" data-city="上海">上海</button>
                        <button class="quick-city" data-city="广州">广州</button>
                        <button class="quick-city" data-city="深圳">深圳</button>
                        <button class="quick-city" data-city="成都">成都</button>
                    </div>
                </div>

                <!-- 避难所类型筛选 -->
                <div class="filter-section">
                    <h3><i class="fas fa-building-shield"></i> 避难所类型</h3>
                    <div class="filter-options">
                        <label class="checkbox-item">
                            <input type="checkbox" value="metro" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">
                                <i class="fas fa-subway" style="color: #3498db;"></i>
                                地铁站
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" value="air-raid" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">
                                <i class="fas fa-bunker" style="color: #e74c3c;"></i>
                                人防工程
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" value="underground" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">
                                <i class="fas fa-dungeon" style="color: #9b59b6;"></i>
                                地下停车场
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" value="shopping" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">
                                <i class="fas fa-shopping-cart" style="color: #f39c12;"></i>
                                地下商场
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" value="government" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">
                                <i class="fas fa-landmark" style="color: #27ae60;"></i>
                                政府避难所
                            </span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" value="hospital" checked>
                            <span class="checkmark"></span>
                            <span class="label-text">
                                <i class="fas fa-hospital" style="color: #e91e63;"></i>
                                医院防空设施
                            </span>
                        </label>
                    </div>
                </div>

                <!-- 容量筛选 -->
                <div class="filter-section">
                    <h3><i class="fas fa-users"></i> 容纳人数</h3>
                    <div class="capacity-range">
                        <input type="range" id="capacity-slider" min="0" max="10000" value="0" step="100">
                        <div class="capacity-labels">
                            <span>不限</span>
                            <span>1000+</span>
                            <span>5000+</span>
                            <span>10000+</span>
                        </div>
                    </div>
                </div>

                <!-- 距离筛选（移动端显示） -->
                <div class="filter-section mobile-only">
                    <h3><i class="fas fa-location-arrow"></i> 距离范围</h3>
                    <div class="distance-options">
                        <button class="dist-btn active" data-dist="1000">1公里</button>
                        <button class="dist-btn" data-dist="3000">3公里</button>
                        <button class="dist-btn" data-dist="5000">5公里</button>
                        <button class="dist-btn" data-dist="10000">10公里</button>
                    </div>
                </div>

                <!-- 统计信息 -->
                <div class="filter-section stats-section">
                    <h3><i class="fas fa-chart-bar"></i> 统计信息</h3>
                    <div class="stat-cards">
                        <div class="stat-card">
                            <span class="stat-number" id="stat-total">0</span>
                            <span class="stat-label">总避难所</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="stat-visible">0</span>
                            <span class="stat-label">当前显示</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" id="stat-capacity">0</span>
                            <span class="stat-label">总容量(万)</span>
                        </div>
                    </div>
                </div>

                <!-- 图例 -->
                <div class="filter-section">
                    <h3><i class="fas fa-map-signs"></i> 图例说明</h3>
                    <div class="legend">
                        <div class="legend-item">
                            <span class="legend-icon" style="background: #3498db;">
                                <i class="fas fa-subway"></i>
                            </span>
                            <span>地铁站</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon" style="background: #e74c3c;">
                                <i class="fas fa-bunker"></i>
                            </span>
                            <span>人防工程</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon" style="background: #9b59b6;">
                                <i class="fas fa-dungeon"></i>
                            </span>
                            <span>地下停车场</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon" style="background: #f39c12;">
                                <i class="fas fa-shopping-cart"></i>
                            </span>
                            <span>地下商场</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon" style="background: #27ae60;">
                                <i class="fas fa-landmark"></i>
                            </span>
                            <span>政府避难所</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-icon" style="background: #e91e63;">
                                <i class="fas fa-hospital"></i>
                            </span>
                            <span>医院防空设施</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 地图容器 -->
        <main class="map-container" id="map-container">
            <div id="map"></div>
            
            <!-- 地图控件 -->
            <div class="map-controls">
                <button class="map-control-btn" id="locate-btn" title="定位当前位置">
                    <i class="fas fa-crosshairs"></i>
                </button>
                <button class="map-control-btn" id="fullscreen-btn" title="全屏模式">
                    <i class="fas fa-expand"></i>
                </button>
                <button class="map-control-btn" id="layer-toggle-btn" title="切换地图图层">
                    <i class="fas fa-layer-group"></i>
                </button>
                <div class="zoom-controls">
                    <button class="map-control-btn" id="zoom-in-btn" title="放大">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button class="map-control-btn" id="zoom-out-btn" title="缩小">
                        <i class="fas fa-minus"></i>
                    </button>
                </div>
            </div>

            <!-- 图层选择面板 -->
            <div class="layer-panel" id="layer-panel">
                <div class="layer-option active" data-layer="streets">
                    <i class="fas fa-road"></i>
                    <span>街道图</span>
                </div>
                <div class="layer-option" data-layer="satellite">
                    <i class="fas fa-satellite"></i>
                    <span>卫星图</span>
                </div>
                <div class="layer-option" data-layer="dark">
                    <i class="fas fa-moon"></i>
                    <span>暗黑模式</span>
                </div>
            </div>

            <!-- 底部信息栏 -->
            <div class="map-footer">
                <div class="footer-info">
                    <span id="current-city">全国</span>
                    <span class="divider">|</span>
                    <span id="coordinates">点击地图获取坐标</span>
                </div>
                <div class="footer-actions">
                    <button id="reset-view-btn">
                        <i class="fas fa-globe-asia"></i> 全国视图
                    </button>
                </div>
            </div>
        </main>

        <!-- 避难所详情面板 -->
        <div class="detail-panel" id="detail-panel">
            <div class="detail-header">
                <button class="detail-close" id="detail-close">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <h2 id="detail-title">避难所详情</h2>
            </div>
            <div class="detail-content" id="detail-content">
                <!-- 动态内容 -->
            </div>
            <div class="detail-actions">
                <button class="btn-route" id="btn-route">
                    <i class="fas fa-directions"></i> 导航前往
                </button>
                <button class="btn-share" id="btn-share">
                    <i class="fas fa-share-alt"></i> 分享位置
                </button>
            </div>
        </div>

        <!-- 生存指南侧边栏 -->
        <div class="guide-sidebar" id="guide-sidebar">
            <div class="guide-header">
                <h2><i class="fas fa-book-medical"></i> 核战争生存指南</h2>
                <button class="guide-close" id="guide-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="guide-content">
                <nav class="guide-nav">
                    <button class="guide-nav-item active" data-section="warning">
                        <i class="fas fa-radiation"></i> 预警识别
                    </button>
                    <button class="guide-nav-item" data-section="evacuate">
                        <i class="fas fa-running"></i> 紧急撤离
                    </button>
                    <button class="guide-nav-item" data-section="shelter">
                        <i class="fas fa-house-damage"></i> 避难所选择
                    </button>
                    <button class="guide-nav-item" data-section="supplies">
                        <i class="fas fa-box-open"></i> 必备物资
                    </button>
                    <button class="guide-nav-item" data-section="skills">
                        <i class="fas fa-hands-helping"></i> 生存技能
                    </button>
                    <button class="guide-nav-item" data-section="health">
                        <i class="fas fa-heartbeat"></i> 医疗急救
                    </button>
                </nav>
                <div class="guide-sections" id="guide-sections">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>

        <!-- 紧急模式遮罩 -->
        <div class="emergency-overlay" id="emergency-overlay">
            <div class="emergency-content">
                <div class="emergency-header">
                    <i class="fas fa-radiation-alt pulse"></i>
                    <h1>紧急避难模式</h1>
                </div>
                <div class="emergency-actions">
                    <button class="emergency-btn primary" id="emergency-find">
                        <i class="fas fa-location-arrow"></i>
                        <span>寻找最近避难所</span>
                    </button>
                    <button class="emergency-btn" id="emergency-sos">
                        <i class="fas fa-bell"></i>
                        <span>发送求救信号</span>
                    </button>
                    <button class="emergency-btn" id="emergency-guide">
                        <i class="fas fa-book-open"></i>
                        <span>快速查看指南</span>
                    </button>
                </div>
                <button class="emergency-exit" id="emergency-exit">
                    <i class="fas fa-times"></i> 退出紧急模式
                </button>
            </div>
        </div>

        <!-- 移动端底部导航 -->
        <nav class="mobile-nav" id="mobile-nav">
            <button class="mobile-nav-item active" data-view="map">
                <i class="fas fa-map"></i>
                <span>地图</span>
            </button>
            <button class="mobile-nav-item" data-view="list">
                <i class="fas fa-list"></i>
                <span>列表</span>
            </button>
            <button class="mobile-nav-item" data-view="filter">
                <i class="fas fa-filter"></i>
                <span>筛选</span>
            </button>
            <button class="mobile-nav-item" data-view="guide">
                <i class="fas fa-book-medical"></i>
                <span>指南</span>
            </button>
        </nav>

        <!-- 避难所列表面板（移动端） -->
        <div class="list-panel" id="list-panel">
            <div class="list-header">
                <h3>附近避难所</h3>
                <span class="list-count" id="list-count">0个</span>
            </div>
            <div class="list-content" id="list-content">
                <!-- 动态加载 -->
            </div>
        </div>

        <!-- 遮罩层 -->
        <div class="overlay" id="overlay"></div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>
    
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    
    <!-- Leaflet Fullscreen -->
    <script src="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/Leaflet.fullscreen.min.js"></script>
    
    <!-- 数据文件 -->
    <script src="data/cities.js"></script>
    <script src="data/shelters.js"></script>
    
    <!-- 应用脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/search.js"></script>
    <script src="js/shelters.js"></script>
    <script src="js/guide.js"></script>
    <script src="js/mobile.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
