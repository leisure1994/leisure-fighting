server {
    listen 80;
    server_name a-art.top www.a-art.top;
    
    # 强制 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name a-art.top www.a-art.top;
    
    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/a-art.top.crt;
    ssl_certificate_key /etc/nginx/ssl/a-art.top.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # 现代 TLS 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # 日志
    access_log /var/log/nginx/nuclear-map-access.log combined;
    error_log /var/log/nginx/nuclear-map-error.log warn;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml
        font/woff2;
    
    # 根目录
    root /usr/share/nginx/html;
    index index.html;
    
    # 核战争地图专区
    location /nuclear-map/ {
        alias /usr/share/nginx/html/nuclear-map/;
        try_files $uri $uri/ /nuclear-map/index.html;
        
        # 缓存控制
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
        
        # HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        
        # 数据文件（短缓存）
        location ~* \.(json|geojson)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }
    
    # API 代理（如果有后端）
    location /api/ {
        proxy_pass http://localhost:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # 安全头
    include /etc/nginx/conf.d/security.conf;
    
    # 错误页面
    error_page 404 /nuclear-map/index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # 限流（防爬虫）
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req zone=general burst=20 nodelay;
}

# 静态资源 CDN 子域名（可选）
server {
    listen 443 ssl http2;
    server_name static.a-art.top;
    
    ssl_certificate /etc/nginx/ssl/a-art.top.crt;
    ssl_certificate_key /etc/nginx/ssl/a-art.top.key;
    
    # 长缓存静态资源
    location / {
        root /usr/share/nginx/html/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
}