version: '3.8'

services:
  nuclear-map:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: nuclear-map
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      # 挂载数据卷（持久化用户数据）
      - ./data:/usr/share/nginx/html/nuclear-map/data
      # 日志
      - ./logs:/var/log/nginx
    networks:
      - nuclear-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nuclear-map/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.a-art.service=nuclear-map"
      - "com.a-art.environment=production"

  # Nginx 反向代理（生产环境使用）
  nginx-proxy:
    image: nginx:alpine
    container_name: nuclear-map-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - nuclear-map
    networks:
      - nuclear-network
    profiles:
      - production

  # 可选: Redis 缓存（高并发场景）
  redis:
    image: redis:7-alpine
    container_name: nuclear-map-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - nuclear-network
    profiles:
      - cache

  # 可选: 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: nuclear-map-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nuclear-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: nuclear-map-grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - nuclear-network
    profiles:
      - monitoring

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  nuclear-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16