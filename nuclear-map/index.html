  <style>
    /* Critical CSS - 页面加载前渲染 */
    :root {
      --bg-primary: #0F0F1A;
      --bg-secondary: #16213E;
      --text-primary: #EAEAEA;
      --accent-orange: #FF6B35;
      --accent-cyan: #00D9FF;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* 扫描线效果 */
    .scanlines::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.1),
        rgba(0, 0, 0, 0.1) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 9999;
      opacity: 0.3;
    }
    
    /* 加载动画 */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.5s ease;
    }
    
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader-radiation {
      width: 80px;
      height: 80px;
      border: 3px solid var(--accent-orange);
      border-radius: 50%;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loader-radiation::before,
    .loader-radiation::after {
      content: '';
      position: absolute;
      border: 2px solid var(--accent-orange);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .loader-radiation::before {
      width: 50%;
      height: 50%;
    }
    
    .loader-radiation::after {
      width: 25%;
      height: 25%;
      background: var(--accent-orange);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    
    .loader-text {
      margin-top: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--accent-cyan);
      letter-spacing: 2px;
    }
    
    /* 闪烁光标 */
    .cursor-blink::after {
      content: '|';
      animation: blink 1s step-end infinite;
      color: var(--accent-orange);
    }
    
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body class="scanlines">
  <!-- 加载动画 -->
  <div id="loader">

    <div class="loader-text cursor-blink">INITIALIZING SURVIVAL PROTOCOL</div>
  </div>

          crossorigin=""></script>

  <!-- 隐藏加载动画 -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 1500);
    });
  </script>
</body>
