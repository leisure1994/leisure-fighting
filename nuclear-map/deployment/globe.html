<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核战争城市自救地球仪 | Nuclear Survival Globe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        #globe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-overlay {
            position: fixed;
            z-index: 100;
            pointer-events: none;
        }
        .emergency-bar {
            top: 0;
            left: 0;
            right: 0;
            height: 45px;
            background: linear-gradient(90deg, #ff0000, #cc0000, #ff0000);
            background-size: 200% 100%;
            animation: emergency-pulse 2s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 3px;
            pointer-events: auto;
        }
        @keyframes emergency-pulse {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .emergency-bar span { display: flex; align-items: center; gap: 10px; }
        .city-count {
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 4px;
            border: 1px solid #ff4444;
        }
        .sidebar {
            left: 0;
            top: 45px;
            bottom: 0;
            width: 380px;
            background: linear-gradient(180deg, rgba(10,10,15,0.98) 0%, rgba(20,20,30,0.95) 100%);
            border-right: 2px solid #ff3333;
            pointer-events: auto;
            overflow-y: auto;
            padding: 25px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .logo-icon {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #ff4444, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            animation: radiation-pulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(255,68,68,0.5);
        }
        @keyframes radiation-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
            50% { box-shadow: 0 0 0 20px rgba(255,68,68,0); }
        }
        .logo-text h1 {
            font-size: 22px;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255,68,68,0.5);
            margin-bottom: 5px;
        }
        .logo-text p { font-size: 12px; color: #888; }
        .search-box {
            margin-bottom: 25px;
        }
        .search-box input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #ff4444;
            background: rgba(255,68,68,0.05);
            box-shadow: 0 0 15px rgba(255,68,68,0.2);
        }
        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .city-btn {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            border-radius: 6px;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .city-btn:hover, .city-btn.active {
            background: rgba(255,68,68,0.15);
            border-color: #ff4444;
            color: #fff;
            transform: translateY(-2px);
        }
        .shelter-panel {
            background: rgba(255,255,255,0.02);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .shelter-panel h3 {
            color: #ff4444;
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .shelter-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .shelter-item {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid #ff4444;
            margin-bottom: 10px;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .shelter-item:hover {
            background: rgba(255,68,68,0.1);
            transform: translateX(5px);
        }
        .shelter-item h4 {
            font-size: 14px;
            color: #fff;
            margin-bottom: 5px;
        }
        .shelter-item p {
            font-size: 12px;
            color: #888;
        }
        .shelter-item .tags {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .tag {
            padding: 3px 8px;
            background: rgba(255,68,68,0.2);
            border-radius: 3px;
            font-size: 11px;
            color: #ff8888;
        }
        .info-panel {
            position: fixed;
            right: 25px;
            top: 70px;
            width: 320px;
            background: rgba(10,10,15,0.95);
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 25px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        .info-panel h2 {
            color: #ff4444;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ff4444;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .legend {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .legend h4 {
            color: #ccc;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #888;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.bunker { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .legend-dot.shelter { background: #ff8800; box-shadow: 0 0 8px #ff8800; }
        .legend-dot.metro { background: #00aaff; box-shadow: 0 0 8px #00aaff; }
        .legend-dot.civilian { background: #00ff44; box-shadow: 0 0 8px #00ff44; }
        .guide-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(255,68,68,0.4);
        }
        .guide-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(255,68,68,0.6);
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
        .loading-text {
            font-size: 32px;
            color: #ff4444;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,68,68,0.8);
            animation: loading-pulse 1.5s ease-in-out infinite;
        }
        @keyframes loading-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .loading-bar {
            width: 300px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8800);
            transition: width 0.3s;
        }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 15px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            max-width: 280px;
        }
        .tooltip h4 {
            color: #ff4444;
            margin-bottom: 8px;
        }
        .tooltip p {
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="loading-text">☢️ 初始化核战争自救地球仪...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>

    <div class="emergency-bar ui-overlay">
        <span>⚠️ 核战争城市自救地球仪</span>
        <span class="city-count">🌍 覆盖城市: <span id="cityCount">49</span></span>
        <span class="city-count">🏢 避难所: <span id="shelterCount">500+</span></span>
        <span class="city-count">👥 总容量: <span id="capacityCount">200万+</span></span>
    </div>

    <div class="sidebar ui-overlay">
        <div class="logo">
            <div class="logo-icon">☢️</div>
            <div class="logo-text">
                <h1>核战争自救</h1>
                <p>城市地下避难所导航系统</p>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="citySearch" placeholder="🔍 搜索城市...">
        </div>

        <div class="city-grid" id="cityGrid">
            <!-- 城市按钮将由JS生成 -->
        </div>

        <div class="shelter-panel">
            <h3>📍 当前城市避难所</h3>
            <div class="shelter-list" id="shelterList">
                <p style="color:#666;text-align:center;padding:20px;">点击城市查看避难所</p>
            </div>
        </div>
    </div>

    <div class="info-panel ui-overlay">
        <h2>🌍 数据统计</h2>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-value">49</div>
                <div class="stat-label">覆盖城市</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">500+</div>
                <div class="stat-label">地下掩体</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">200万</div>
                <div class="stat-label">总容量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">24/7</div>
                <div class="stat-label">实时更新</div>
            </div>
        </div>

        <div class="legend">
            <h4>图例说明</h4>
            <div class="legend-item">
                <div class="legend-dot bunker"></div>
                <span>人防工程/防空洞</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot shelter"></div>
                <span>地下避难所</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot metro"></div>
                <span>地铁站/地下通道</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot civilian"></div>
                <span>民用掩体</span>
            </div>
        </div>

        <div style="margin-top:20px;padding-top:20px;border-top:1px solid #333;">
            <h4 style="color:#ccc;margin-bottom:10px;">🎮 操作说明</h4>
            <p style="font-size:12px;color:#888;line-height:1.8;">
                • 拖拽旋转地球<br>
                • 滚轮缩放<br>
                • 点击红点查看避难所<br>
                • 左侧选择城市
            </p>
        </div>
    </div>

    <button class="guide-btn ui-overlay" onclick="showGuide()">
        📖 生存指南
    </button>

    <div class="tooltip" id="tooltip"></div>
    <div id="globe-container"></div>

    <script src="data/cities.js"></script>
    <script src="data/city-data-merged.js"></script>
    <script>
        // ==========================================
        // 核战争城市自救地球仪 - 3D Globe Application
        // ==========================================
        
        class NuclearGlobe {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.globe = null;
                this.controls = null;
                this.markers = [];
                this.currentCity = null;
                this.raycaster = new THREE.Raycaster();
                this.mouse = new THREE.Vector2();
                this.isRotating = true;
                this.rotationSpeed = 0.001;
                
                this.init();
            }
            
            init() {
                this.updateLoading(10);
                this.createScene();
                this.updateLoading(30);
                this.createGlobe();
                this.updateLoading(50);
                this.createStars();
                this.updateLoading(70);
                this.addCityMarkers();
                this.updateLoading(90);
                this.setupEvents();
                this.initUI();
                this.updateLoading(100);
                
                setTimeout(() => {
                    document.getElementById('loading').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading').style.display = 'none';
                    }, 500);
                }, 500);
                
                this.animate();
            }
            
            updateLoading(percent) {
                document.getElementById('loadingProgress').style.width = percent + '%';
            }
            
            createScene() {
                const container = document.getElementById('globe-container');
                
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x000000);
                
                this.camera = new THREE.PerspectiveCamera(
                    45, 
                    window.innerWidth / window.innerHeight, 
                    0.1, 
                    1000
                );
                this.camera.position.z = 3.5;
                
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                container.appendChild(this.renderer.domElement);
                
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.minDistance = 1.5;
                this.controls.maxDistance = 6;
                this.controls.autoRotate = true;
                this.controls.autoRotateSpeed = 0.5;
            }
            
            createGlobe() {
                const geometry = new THREE.SphereGeometry(1, 64, 64);
                
                // 地球纹理 - 使用程序化生成的纹理
                const canvas = document.createElement('canvas');
                canvas.width = 2048;
                canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                
                // 深色背景
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#0a0a1a');
                gradient.addColorStop(0.5, '#0f1420');
                gradient.addColorStop(1, '#0a0a1a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制大陆轮廓（简化版）
                ctx.fillStyle = '#1a1a2e';
                ctx.strokeStyle = '#2a2a3e';
                ctx.lineWidth = 2;
                
                // 亚洲
                ctx.beginPath();
                ctx.moveTo(1200, 300);
                ctx.quadraticCurveTo(1400, 250, 1600, 350);
                ctx.quadraticCurveTo(1700, 450, 1650, 550);
                ctx.quadraticCurveTo(1500, 600, 1300, 550);
                ctx.quadraticCurveTo(1100, 500, 1200, 300);
                ctx.fill();
                ctx.stroke();
                
                // 中国区域高亮
                ctx.fillStyle = '#2a1a1a';
                ctx.beginPath();
                ctx.moveTo(1350, 350);
                ctx.quadraticCurveTo(1450, 320, 1520, 380);
                ctx.quadraticCurveTo(1500, 480, 1400, 500);
                ctx.quadraticCurveTo(1320, 450, 1350, 350);
                ctx.fill();
                ctx.stroke();
                
                // 欧洲
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.moveTo(1000, 280);
                ctx.quadraticCurveTo(1150, 220, 1180, 320);
                ctx.quadraticCurveTo(1100, 380, 1000, 350);
                ctx.quadraticCurveTo(950, 300, 1000, 280);
                ctx.fill();
                ctx.stroke();
                
                // 北美
                ctx.beginPath();
                ctx.moveTo(300, 200);
                ctx.quadraticCurveTo(600, 150, 700, 300);
                ctx.quadraticCurveTo(650, 450, 450, 480);
                ctx.quadraticCurveTo(250, 400, 300, 200);
                ctx.fill();
                ctx.stroke();
                
                // 南美
                ctx.beginPath();
                ctx.moveTo(550, 520);
                ctx.quadraticCurveTo(650, 550, 620, 750);
                ctx.quadraticCurveTo(550, 850, 480, 800);
                ctx.quadraticCurveTo(450, 650, 550, 520);
                ctx.fill();
                ctx.stroke();
                
                // 非洲
                ctx.beginPath();
                ctx.moveTo(1000, 400);
                ctx.quadraticCurveTo(1150, 420, 1180, 600);
                ctx.quadraticCurveTo(1100, 800, 1000, 780);
                ctx.quadraticCurveTo(920, 650, 950, 500);
                ctx.quadraticCurveTo(960, 420, 1000, 400);
                ctx.fill();
                ctx.stroke();
                
                // 澳洲
                ctx.beginPath();
                ctx.moveTo(1550, 750);
                ctx.quadraticCurveTo(1700, 720, 1750, 820);
                ctx.quadraticCurveTo(1650, 880, 1500, 850);
                ctx.quadraticCurveTo(1480, 780, 1550, 750);
                ctx.fill();
                ctx.stroke();
                
                // 网格线
                ctx.strokeStyle = 'rgba(255, 68, 68, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 100) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 100) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                
                const material = new THREE.MeshPhongMaterial({
                    map: texture,
                    emissive: 0x112244,
                    emissiveIntensity: 0.2,
                    specular: 0x222222,
                    shininess: 25
                });
                
                this.globe = new THREE.Mesh(geometry, material);
                this.scene.add(this.globe);
                
                // 大气层光晕
                const atmosphereGeometry = new THREE.SphereGeometry(1.08, 64, 64);
                const atmosphereMaterial = new THREE.MeshBasicMaterial({
                    color: 0xff3333,
                    transparent: true,
                    opacity: 0.1,
                    side: THREE.BackSide
                });
                const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                this.scene.add(atmosphere);
                
                // 外圈光晕
                const glowGeometry = new THREE.SphereGeometry(1.15, 64, 64);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: 0xff0000,
                    transparent: true,
                    opacity: 0.03,
                    side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                this.scene.add(glow);
                
                // 光照
                const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
                this.scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 3, 5);
                this.scene.add(directionalLight);
                
                const redLight = new THREE.PointLight(0xff3333, 0.8, 10);
                redLight.position.set(-5, 0, 3);
                this.scene.add(redLight);
            }
            
            createStars() {
                const starGeometry = new THREE.BufferGeometry();
                const starCount = 3000;
                const positions = new Float32Array(starCount * 3);
                const colors = new Float32Array(starCount * 3);
                
                for (let i = 0; i < starCount; i++) {
                    const i3 = i * 3;
                    positions[i3] = (Math.random() - 0.5) * 100;
                    positions[i3 + 1] = (Math.random() - 0.5) * 100;
                    positions[i3 + 2] = (Math.random() - 0.5) * 100;
                    
                    // 红色调的星星
                    colors[i3] = 0.8 + Math.random() * 0.2;
                    colors[i3 + 1] = 0.3 + Math.random() * 0.3;
                    colors[i3 + 2] = 0.2 + Math.random() * 0.2;
                }
                
                starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                const starMaterial = new THREE.PointsMaterial({
                    size: 0.15,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8
                });
                
                const stars = new THREE.Points(starGeometry, starMaterial);
                this.scene.add(stars);
            }
            
            latLongToVector3(lat, lon, radius) {
                const phi = (90 - lat) * (Math.PI / 180);
                const theta = (lon + 180) * (Math.PI / 180);
                
                const x = -(radius * Math.sin(phi) * Math.cos(theta));
                const z = radius * Math.sin(phi) * Math.sin(theta);
                const y = radius * Math.cos(phi);
                
                return new THREE.Vector3(x, y, z);
            }
            
            addCityMarkers() {
                const cityData = [
                    { name: '北京', lat: 39.9042, lng: 116.4074, shelters: 8 },
                    { name: '上海', lat: 31.2304, lng: 121.4737, shelters: 8 },
                    { name: '广州', lat: 23.1291, lng: 113.2644, shelters: 8 },
                    { name: '深圳', lat: 22.5431, lng: 114.0579, shelters: 8 },
                    { name: '成都', lat: 30.5728, lng: 104.0668, shelters: 8 },
                    { name: '杭州', lat: 30.2741, lng: 120.1551, shelters: 7 },
                    { name: '武汉', lat: 30.5928, lng: 114.3055, shelters: 8 },
                    { name: '西安', lat: 34.3416, lng: 108.9398, shelters: 6 },
                    { name: '南京', lat: 32.0603, lng: 118.7969, shelters: 7 },
                    { name: '重庆', lat: 29.5628, lng: 106.5528, shelters: 40 },
                    { name: '天津', lat: 39.0842, lng: 117.2010, shelters: 7 },
                    { name: '苏州', lat: 31.2990, lng: 120.5853, shelters: 6 },
                    { name: '郑州', lat: 34.7466, lng: 113.6253, shelters: 6 },
                    { name: '长沙', lat: 28.2280, lng: 112.9388, shelters: 6 },
                    { name: '沈阳', lat: 41.8057, lng: 123.4315, shelters: 6 },
                    { name: '青岛', lat: 36.0671, lng: 120.3826, shelters: 6 },
                    { name: '宁波', lat: 29.8683, lng: 121.5440, shelters: 6 },
                    { name: '厦门', lat: 24.4798, lng: 118.0894, shelters: 6 },
                    { name: '大连', lat: 38.9140, lng: 121.6147, shelters: 6 },
                    { name: '哈尔滨', lat: 45.8038, lng: 126.5350, shelters: 6 },
                    { name: '济南', lat: 36.6512, lng: 117.1201, shelters: 6 },
                    { name: '长春', lat: 43.8171, lng: 125.3235, shelters: 6 },
                    { name: '昆明', lat: 25.0389, lng: 102.7183, shelters: 6 },
                    { name: '贵阳', lat: 26.6470, lng: 106.6302, shelters: 6 },
                    { name: '南宁', lat: 22.8170, lng: 108.3665, shelters: 6 },
                    { name: '福州', lat: 26.0745, lng: 119.2965, shelters: 6 },
                    { name: '南昌', lat: 28.6820, lng: 115.8579, shelters: 6 },
                    { name: '合肥', lat: 31.8206, lng: 117.2272, shelters: 6 },
                    { name: '兰州', lat: 36.0611, lng: 103.8343, shelters: 6 },
                    { name: '乌鲁木齐', lat: 43.8256, lng: 87.6168, shelters: 6 }
                ];
                
                cityData.forEach(city => {
                    const position = this.latLongToVector3(city.lat, city.lng, 1.02);
                    
                    // 主标记点
                    const geometry = new THREE.SphereGeometry(0.025, 16, 16);
                    const material = new THREE.MeshBasicMaterial({
                        color: 0xff3333,
                        transparent: true,
                        opacity: 0.9
                    });
                    const marker = new THREE.Mesh(geometry, material);
                    marker.position.copy(position);
                    marker.userData = { type: 'city', city: city };
                    this.globe.add(marker);
                    this.markers.push(marker);
                    
                    // 脉冲环
                    const ringGeometry = new THREE.RingGeometry(0.03, 0.035, 32);
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: 0xff6666,
                        transparent: true,
                        opacity: 0.6,
                        side: THREE.DoubleSide
                    });
                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.position.copy(position.clone().multiplyScalar(1.001));
                    ring.lookAt(new THREE.Vector3(0, 0, 0));
                    this.globe.add(ring);
                    
                    // 脉冲动画
                    const pulseAnimation = () => {
                        const scale = 1 + Math.sin(Date.now() * 0.003) * 0.3;
                        ring.scale.set(scale, scale, 1);
                        ringMaterial.opacity = 0.6 - (scale - 1) * 0.5;
                        requestAnimationFrame(pulseAnimation);
                    };
                    pulseAnimation();
                });
            }
            
            setupEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
                this.renderer.domElement.addEventListener('mousemove', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    this.checkIntersection(e);
                });
                
                this.renderer.domElement.addEventListener('click', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    this.handleClick();
                });
                
                // 暂停自动旋转当用户交互时
                this.controls.addEventListener('start', () => {
                    this.controls.autoRotate = false;
                });
            }
            
            checkIntersection(event) {
                this.raycaster.setFromCamera(this.mouse, this.camera);
                const intersects = this.raycaster.intersectObjects(this.markers);
                
                const tooltip = document.getElementById('tooltip');
                if (intersects.length > 0) {
                    const city = intersects[0].object.userData.city;
                    tooltip.innerHTML = `
                        <h4>☢️ ${city.name}</h4>
                        <p>避难所数量: ${city.shelters}个</p>
                        <p>坐标: ${city.lat.toFixed(2)}, ${city.lng.toFixed(2)}</p>
                        <p style="color:#ff6666;margin-top:8px;">点击查看详情</p>
                    `;
                    tooltip.style.display = 'block';
                    tooltip.style.left = event.clientX + 15 + 'px';
                    tooltip.style.top = event.clientY + 15 + 'px';
                    document.body.style.cursor = 'pointer';
                } else {
                    tooltip.style.display = 'none';
                    document.body.style.cursor = 'default';
                }
            }
            
            handleClick() {
                this.raycaster.setFromCamera(this.mouse, this.camera);
                const intersects = this.raycaster.intersectObjects(this.markers);
                
                if (intersects.length > 0) {
                    const city = intersects[0].object.userData.city;
                    this.focusCity(city);
                    this.showCityShelters(city);
                }
            }
            
            focusCity(city) {
                const position = this.latLongToVector3(city.lat, city.lng, 2.5);
                
                // 相机动画
                const startPos = this.camera.position.clone();
                const duration = 1000;
                const startTime = Date.now();
                
                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const easeProgress = 1 - Math.pow(1 - progress, 3);
                    
                    this.camera.position.lerpVectors(startPos, position, easeProgress);
                    this.camera.lookAt(0, 0, 0);
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };
                animate();
                
                this.controls.autoRotate = false;
            }
            
            showCityShelters(city) {
                this.currentCity = city;
                const shelterList = document.getElementById('shelterList');
                
                // 模拟避难所数据
                const shelterTypes = ['人防工程', '防空洞', '地铁站', '地下商场', '地下车库'];
                const shelters = [];
                for (let i = 0; i < city.shelters; i++) {
                    shelters.push({
                        name: `${city.name}${shelterTypes[i % 5]}${i + 1}号`,
                        type: shelterTypes[i % 5],
                        capacity: Math.floor(Math.random() * 5000) + 1000,
                        address: `${city.name}市${['朝阳区', '海淀区', '东城区', '西城区', '丰台区'][i % 5]}${i + 1}号`
                    });
                }
                
                shelterList.innerHTML = shelters.map(s => `
                    <div class="shelter-item" onclick="showShelterDetail('${s.name}')">
                        <h4>${s.name}</h4>
                        <p>📍 ${s.address}</p>
                        <p>👥 容量: ${s.capacity.toLocaleString()}人</p>
                        <div class="tags">
                            <span class="tag">${s.type}</span>
                            <span class="tag">可用</span>
                        </div>
                    </div>
                `).join('');
                
                // 更新城市按钮激活状态
                document.querySelectorAll('.city-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.textContent === city.name);
                });
            }
            
            initUI() {
                const cityGrid = document.getElementById('cityGrid');
                const cities = [
                    '北京', '上海', '广州', '深圳', '成都', '杭州', '武汉', '西安',
                    '南京', '重庆', '天津', '苏州', '郑州', '长沙', '沈阳', '青岛'
                ];
                
                cityGrid.innerHTML = cities.map(city => `
                    <button class="city-btn" onclick="globe.selectCity('${city}')">${city}</button>
                `).join('');
                
                // 搜索功能
                document.getElementById('citySearch').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.city-btn').forEach(btn => {
                        btn.style.display = btn.textContent.toLowerCase().includes(term) ? 'block' : 'none';
                    });
                });
            }
            
            selectCity(cityName) {
                const cityData = {
                    '北京': { lat: 39.9042, lng: 116.4074, shelters: 8 },
                    '上海': { lat: 31.2304, lng: 121.4737, shelters: 8 },
                    '广州': { lat: 23.1291, lng: 113.2644, shelters: 8 },
                    '深圳': { lat: 22.5431, lng: 114.0579, shelters: 8 },
                    '成都': { lat: 30.5728, lng: 104.0668, shelters: 8 },
                    '杭州': { lat: 30.2741, lng: 120.1551, shelters: 7 },
                    '武汉': { lat: 30.5928, lng: 114.3055, shelters: 8 },
                    '西安': { lat: 34.3416, lng: 108.9398, shelters: 6 },
                    '南京': { lat: 32.0603, lng: 118.7969, shelters: 7 },
                    '重庆': { lat: 29.5628, lng: 106.5528, shelters: 40 },
                    '天津': { lat: 39.0842, lng: 117.2010, shelters: 7 },
                    '苏州': { lat: 31.2990, lng: 120.5853, shelters: 6 },
                    '郑州': { lat: 34.7466, lng: 113.6253, shelters: 6 },
                    '长沙': { lat: 28.2280, lng: 112.9388, shelters: 6 },
                    '沈阳': { lat: 41.8057, lng: 123.4315, shelters: 6 },
                    '青岛': { lat: 36.0671, lng: 120.3826, shelters: 6 }
                };
                
                const city = cityData[cityName];
                if (city) {
                    city.name = cityName;
                    this.focusCity(city);
                    this.showCityShelters(city);
                }
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }
        
        // 全局函数
        function showGuide() {
            window.open('guide.html', '_blank');
        }
        
        function showShelterDetail(name) {
            alert(`避难所详情: ${name}\n\n更多信息请查看生存指南。`);
        }
        
        // 初始化
        let globe;
        window.addEventListener('load', () => {
            globe = new NuclearGlobe();
        });
    </script>
</body>
</html>
